<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <!-- Force the canonical domain: send Firebase's default URLs to enviguide.com -->
  <script>
    (function () {
      var h = window.location.hostname;
      if (h === 'enviguide-web.web.app' || h === 'enviguide-web.firebaseapp.com') {
        window.location.replace('https://enviguide.com' + window.location.pathname + window.location.search + window.location.hash);
      }
    })();
  </script>
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Web site created using create-react-app" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Local Stylesheets -->
  <link rel="stylesheet" href="%PUBLIC_URL%/assets/css/bootstrap.min.css" />
  <link rel="stylesheet" href="%PUBLIC_URL%/assets/css/style.css" />

  
  <!-- External Stylesheets -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.6.0/slick-theme.min.css" />

  <!-- AOS (Animate on Scroll) -->
  <link rel="preload" href="https://unpkg.com/aos@2.3.1/dist/aos.css" as="style"
    onload="this.onload=null;this.rel='stylesheet'" />

    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
  </noscript>


  <title>enviguide</title>
</head>

  <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>

  <script async defer src="%PUBLIC_URL%/assets/js/script.js" type="text/javascript"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    AOS.init();

</html>
